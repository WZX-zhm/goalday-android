name: Build GoalDay APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GRADLE_OPTS: "-Xmx2g"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew && ls -la ./gradlew

      - name: Test gradlew
        run: ./gradlew --version 2>&1 | head -20

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Verify APK files
        run: |
          echo "=== Debug APK ==="
          ls -la app/build/outputs/apk/debug/ 2>&1 || echo "no debug dir"
          find app/build -name "*.apk" 2>&1 || true
          # 也拷贝一份到根目录方便 artifact 上传
          mkdir -p dist
          find app/build -name "*.apk" -exec cp {} dist/ \;
          ls -la dist/ 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GoalDay-debug-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30
