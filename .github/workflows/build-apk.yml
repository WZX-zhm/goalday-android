name: Build GoalDay APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Verify APK files
        run: |
          echo "=== Debug APK ==="
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -la {} \; || true
          echo "=== Release APK ==="
          find app/build/outputs/apk/release -name "*.apk" -exec ls -la {} \; 2>/dev/null || echo "no release apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GoalDay-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: GoalDay-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 30
