name: Build GoalDay APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      # 确保 gradle-wrapper.jar 存在（本地可能没有提交这个二进制文件）
      - name: Validate & Fix Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
        continue-on-error: true

      - name: Ensure Gradle Wrapper JAR exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found, generating..."
            curl -sL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip gradle-8.4/lib/gradle-launcher*.jar -d /tmp/
            mkdir -p gradle/wrapper
            # 从 Gradle 发行包提取 wrapper jar
            cd /tmp/gradle-8.4
            java -p lib/gradle-launcher*.jar org.gradle.wrapper.GradleWrapperMain --help 2>/dev/null || true
            echo "Downloading gradle-wrapper.jar directly..."
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
            chmod +x gradlew
          fi
          ls -la gradle/wrapper/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - name: Locate APK files
        id: locate
        run: |
          echo "debug_apk=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)" >> $GITHUB_OUTPUT
          echo "release_apk=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1 || echo '')" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GoalDay-debug-apk
          path: ${{ steps.locate.outputs.debug_apk }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: GoalDay-release-apk
          path: ${{ steps.locate.outputs.release_apk }}
          if-no-files-found: ignore
          retention-days: 30
