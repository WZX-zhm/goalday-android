name: Build GoalDay APK

on:
  # 任何 push 到 main/master 都触发
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true   # 没签名不会失败

      - name: Locate APK files
        id: locate
        run: |
          echo "debug_apk=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)" >> $GITHUB_OUTPUT
          echo "release_apk=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1 || echo '')" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GoalDay-debug-apk
          path: ${{ steps.locate.outputs.debug_apk }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: GoalDay-release-apk
          path: ${{ steps.locate.outputs.release_apk }}
          if-no-files-found: ignore
          retention-days: 30
