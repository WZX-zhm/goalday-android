name: Build GoalDay APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GRADLE_OPTS: "-Xmx2g"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew && ls -la ./gradlew

      - name: Test gradlew
        run: ./gradlew --version 2>&1 | head -20

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Locate and copy APK
        run: |
          set -eux
          find app/build -name "*.apk" -type f
          mkdir -p output
          find app/build -name "*.apk" -type f -exec cp -v {} output/ \;
          ls -la output/
          # 验证文件存在
          test -n "$(ls -A output/)" || (echo "no apk found!"; exit 1)

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GoalDay-debug-apk
          path: output/
          if-no-files-found: error
          retention-days: 30
